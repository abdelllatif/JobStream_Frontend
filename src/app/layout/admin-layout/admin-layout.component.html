<div class="admin-wrapper">
  
  <header class="admin-mobile-header">
    <button class="admin-burger-btn" (click)="toggleSidebar()" aria-label="Toggle admin menu">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <span class="admin-mobile-title">Administration</span>
  </header>

  
  @if (sidebarOpen()) {
    <div class="admin-overlay" (click)="closeSidebar()" aria-hidden="true"></div>
  }

  
  <aside class="admin-sidebar" [class.open]="sidebarOpen()" role="navigation" aria-label="Admin navigation">
    
    <div class="admin-brand">
      <span class="brand-icon" aria-hidden="true">&#9881;&#65039;</span>
      <div>
        <span class="brand-name">Administration</span>
        <span class="brand-sub">JobStream</span>
      </div>
    </div>

    
    <div class="admin-user-card" *ngIf="authService.currentUser() as user">
      <div class="admin-avatar">
        <img *ngIf="user.photoUrl" [src]="user.photoUrl" [alt]="(user.firstName || 'Admin') + ' profile picture'" class="avatar-img" width="40" height="40">
        <div *ngIf="!user.photoUrl" class="avatar-placeholder" role="img" [attr.aria-label]="(user.firstName || 'Admin') + ' avatar'">
          {{ (user.firstName || user.email || 'A').charAt(0).toUpperCase() }}
        </div>
      </div>
      <div class="admin-user-info">
        <span class="admin-name">
          {{ user.firstName ? (user.firstName + ' ' + (user.lastName || '')) : user.email }}
        </span>
        <span class="admin-role-badge">Administrateur</span>
      </div>
    </div>

    <nav class="admin-nav" aria-label="Admin menu">
      <a routerLink="/admin/users" routerLinkActive="active" class="admin-nav-item" (click)="closeSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <span>Utilisateurs</span>
      </a>

      <a routerLink="/admin/change-password" routerLinkActive="active" class="admin-nav-item" (click)="closeSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
        <span>Changer le mot de passe</span>
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <button class="admin-logout-btn" (click)="authService.logout()" aria-label="Log out">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span>Deconnecter</span>
      </button>
    </div>
  </aside>

  
  <main class="admin-content" role="main">
    <router-outlet></router-outlet>
  </main>
</div>
